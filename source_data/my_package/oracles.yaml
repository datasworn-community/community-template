_id: my_package
datasworn_version: "0.1.0"
type: expansion
ruleset: starforged
<<: &Source
  title: My Package
  license: https://creativecommons.org/licenses/by/4.0
  url: https://example.com/my-package
  date: 2026-01-01
  authors:
    - name: Your Name
oracles:
  signals:
    name: Signal Oracles
    type: oracle_collection
    oracle_type: tables
    summary: Sample oracle content for a Datasworn community package.
    _source: *Source
    contents:
      encounter:
        name: Signal Encounter
        type: oracle_rollable
        oracle_type: table_text
        summary: Use this sample alongside the Starforged [Action](datasworn:oracle_rollable:starforged/core/action) oracle.
        _source: *Source
        rows:
          - roll: { min: 1, max: 25 }
            text: A familiar call sign repeats through the static
          - roll: { min: 26, max: 50 }
            text: A coded warning arrives from an unknown source
          - roll: { min: 51, max: 75 }
            text: A fragment of old navigation data points toward trouble
          - roll: { min: 76, max: 100 }
            text: A beacon answers before anyone transmits

